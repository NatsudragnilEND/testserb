<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Сербский Язык | Тест 4</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;600;700;800&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <style>
        body { 
            font-family: 'Manrope', sans-serif; 
            background-color: #0f172a; 
            color: #e2e8f0;
            overflow-x: hidden;
            -webkit-tap-highlight-color: transparent;
        }
        .glass { 
            background: rgba(30, 41, 59, 0.4); 
            backdrop-filter: blur(20px); 
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.08); 
        }
        .bento-box { 
            background: linear-gradient(145deg, rgba(30, 41, 59, 0.7), rgba(15, 23, 42, 0.9));
            border: 1px solid #334155; 
            border-radius: 28px; 
            transition: all 0.3s ease;
        }
        .bg-grid { 
            background-size: 30px 30px; 
            background-image: 
                linear-gradient(to right, rgba(255, 255, 255, 0.02) 1px, transparent 1px), 
                linear-gradient(to bottom, rgba(255, 255, 255, 0.02) 1px, transparent 1px); 
        }
        .glow-blue { 
            position: fixed; width: 500px; height: 500px; 
            background: radial-gradient(circle, rgba(59,130,246,0.1) 0%, rgba(15,23,42,0) 70%); 
            top: -100px; left: -100px; border-radius: 50%; pointer-events: none; z-index: -1;
        }
        .glow-purple { 
            position: fixed; width: 500px; height: 500px; 
            background: radial-gradient(circle, rgba(147,51,234,0.1) 0%, rgba(15,23,42,0) 70%); 
            bottom: -100px; right: -100px; border-radius: 50%; pointer-events: none; z-index: -1;
        }
        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-8px); }
            75% { transform: translateX(8px); }
        }
        .shake { animation: shake 0.4s ease-in-out; }
        .option-btn { transition: all 0.2s; }
        .option-btn:active { transform: scale(0.96); }
        .correct { background-color: #10b981 !important; border-color: #059669 !important; color: white !important; }
        .wrong { background-color: #ef4444 !important; border-color: #b91c1c !important; color: white !important; animation: shake 0.4s ease-in-out; }
        .circle-progress { transform: rotate(-90deg); transform-origin: 50% 50%; transition: stroke-dashoffset 1s ease-out; }
    </style>
</head>
<body class="bg-grid min-h-screen flex flex-col justify-between">

    <div class="glow-blue"></div>
    <div class="glow-purple"></div>

    <!-- Шапка -->
    <header class="glass sticky top-0 z-50 py-4 px-4 border-b border-slate-700/50 flex justify-between items-center">
        <div>
            <span class="text-xs uppercase tracking-widest text-slate-400 font-bold">Урок 4 • Тест</span>
            <h1 class="text-lg font-extrabold text-white">Спряжение глаголов</h1>
        </div>
        <div class="flex items-center gap-3">
            <div id="timer" class="bg-slate-800/80 px-3 py-1.5 rounded-full border border-slate-600 font-mono text-sm text-blue-400 font-bold">00:00</div>
            <div class="text-xs text-slate-400 font-semibold" id="question-counter">Вопрос 1 из 10</div>
        </div>
    </header>

    <!-- Прогресс -->
    <div class="w-full bg-slate-800 h-1.5 relative">
        <div id="progress-bar" class="bg-gradient-to-r from-blue-500 to-purple-500 h-full w-0 transition-all duration-300"></div>
    </div>

    <!-- Контент -->
    <main class="flex-1 w-full max-w-3xl mx-auto py-8 px-4 flex flex-col justify-center">
        <div id="quiz-card" class="bento-box p-6 md:p-10 w-full relative">
            
            <!-- Сцена 1: Старт -->
            <div id="start-screen" class="text-center py-6">
                <div class="text-7xl mb-6">⚡</div>
                <h2 class="text-3xl md:text-5xl font-extrabold text-white mb-4">Тест по Уроку 4</h2>
                <p class="text-base md:text-xl text-slate-400 mb-8 max-w-md mx-auto">Проверим твои навыки спряжения сербских глаголов во всех лицах настоящего времени.</p>
                <button onclick="startQuiz()" class="w-full sm:w-auto px-12 py-4 rounded-2xl bg-gradient-to-r from-blue-500 to-purple-600 text-white font-extrabold text-lg">Начать тест</button>
            </div>

            <!-- Сцена 2: Вопросы -->
            <div id="question-screen" class="hidden">
                <div class="mb-6">
                    <h3 id="question-text" class="text-2xl font-extrabold text-white">Текст вопроса...</h3>
                    <p id="question-sub" class="text-sm text-slate-400 mt-2">Пояснение...</p>
                </div>
                <div id="options-container" class="flex flex-col gap-3"></div>
                <div id="explanation-box" class="hidden mt-6 bg-slate-800/80 p-5 rounded-2xl border border-slate-700/50">
                    <h4 class="text-sm font-bold text-blue-400 uppercase tracking-wider mb-1">Разбор правила:</h4>
                    <p id="explanation-text" class="text-slate-300 text-sm md:text-base leading-relaxed"></p>
                    <button onclick="nextQuestion()" class="mt-4 px-6 py-2.5 bg-blue-500 text-white font-bold rounded-xl text-sm">Далее ➔</button>
                </div>
            </div>

            <!-- Сцена 3: Итоги -->
            <div id="result-screen" class="hidden flex flex-col items-center py-6 text-center">
                <div class="relative w-48 h-48 mb-6">
                    <svg class="w-full h-full">
                        <circle cx="96" cy="96" r="80" class="stroke-slate-800 fill-none" stroke-width="12"></circle>
                        <circle cx="96" cy="96" r="80" class="circle-progress stroke-emerald-500 fill-none" stroke-width="12" stroke-linecap="round" stroke-dasharray="502" stroke-dashoffset="502" id="result-ring"></circle>
                    </svg>
                    <div class="absolute inset-0 flex flex-col items-center justify-center">
                        <span id="result-percent" class="text-4xl font-extrabold text-white">0%</span>
                        <span id="result-points" class="text-xs text-slate-400 font-bold uppercase mt-1">0/0 баллов</span>
                    </div>
                </div>
                <h2 id="result-title" class="text-3xl font-extrabold text-white mb-2">Итоги</h2>
                <p id="result-desc" class="text-slate-300 mb-6 max-w-md"></p>
                <div class="grid grid-cols-2 gap-4 w-full max-w-sm mb-8">
                    <div class="bg-slate-800/50 border border-slate-700 p-4 rounded-2xl">
                        <div class="text-slate-400 text-xs font-bold uppercase mb-1">Время</div>
                        <div id="result-time" class="text-xl font-extrabold text-blue-400">00:00</div>
                    </div>
                    <div class="bg-slate-800/50 border border-slate-700 p-4 rounded-2xl">
                        <div class="text-slate-400 text-xs font-bold uppercase mb-1">Оценка</div>
                        <div id="result-rank" class="text-sm font-extrabold text-purple-400">Студент</div>
                    </div>
                </div>
                <div class="flex gap-4 w-full max-w-sm">
                    <button onclick="restartQuiz()" class="flex-1 py-4 bg-gradient-to-r from-blue-500 to-purple-600 text-white font-bold rounded-2xl">Еще раз</button>
                    <button onclick="toggleReview()" id="review-btn" class="flex-1 py-4 bg-slate-800 border border-slate-600 text-slate-200 font-bold rounded-2xl">Ошибки</button>
                </div>
                <div id="review-box" class="hidden w-full max-w-xl text-left mt-8 space-y-4">
                    <h3 class="text-xl font-bold text-white border-b border-slate-700 pb-2 mb-4">Детальный разбор:</h3>
                    <div id="review-items" class="space-y-4"></div>
                </div>
            </div>

        </div>
    </main>

    <script>
        const questions = [
            { text: "Какое окончание соответствует форме «Ја» (Я) в настоящем времени?", sub: "Изучаем окончания.", options: ["-м", "-ш", "-мо"], correct: 0, explanation: "В настоящем времени форма «Ја» всегда имеет окончание «-м» (например, ја читам, ја говорим, ја пишем)." },
            { text: "Какое окончание имеет форма «Ми» (Мы) в настоящем времени?", sub: "Изучаем окончания.", options: ["-те", "-мо", "-ју"], correct: 1, explanation: "Для «Ми» окончанием всегда служит суффикс «-мо» (например, ми читамо, ми пишемо, ми говоримо)." },
            { text: "Какая форма глагола «Читати» верна для местоимения «Они»?", sub: "Группа спряжения на -А.", options: ["читамо", "читају", "читате"], correct: 1, explanation: "Глаголы на «-ати» (как читати) в 3-м лице мн. ч. получают окончание «-ју» ➔ читају." },
            { text: "Как правильно сказать «Ты говоришь по-сербски»?", sub: "Глагол «Говорити» (группа -И).", options: ["Ти говорим српски", "Ти говориш српски", "Ти говорите српски"], correct: 1, explanation: "Для «Ти» окончанием служит «-ш». Глагол говорити ➔ говориш. Ти говориш српски." },
            { text: "Какая форма глагола «Писати» (Писать) верна для «Ја»?", sub: "Осторожно, чередование гласных в основе (группа -Е).", options: ["Ја пишем", "Ја писам", "Ја писивам"], correct: 0, explanation: "В глаголах группы «-е» часто происходит чередование. Писати ➔ пишем. Ја пишем — Я пишу." },
            { text: "Как сказать «Мы пишем письмо» (письмо = писмо)?", sub: "Спрягаем глагол «Писати».", options: ["Ми писамо писмо", "Ми пишемо писмо", "Ми пишу писмо"], correct: 1, explanation: "Для местоимения «Ми» используется форма «пишемо». Ми пишемо писмо." },
            { text: "Как спрягается глагол «Говорити» (говорить) для местоимения «Они»?", sub: "Группа спряжения на -И.", options: ["говорију", "говоре", "говору"], correct: 1, explanation: "Глаголы группы «-и» в форме «Они» получают окончание «-е» (вместо исходного «и» в основе) ➔ говоре (говорят)." },
            { text: "Как спрягается глагол «Знати» (знать) для формы «Он / Она»?", sub: "Единственное число, 3-е лицо.", options: ["зна", "знам", "знају"], correct: 0, explanation: "В 3-м лице единственного числа (Он/Она) у глаголов нет личного окончания, остается чистая основа ➔ зна (знает)." },
            { text: "Как спросить у собеседника уважительно: «Вы понимаете?» (понимать = разумети)?", sub: "Форма на «Ви».", options: ["Ви разумете?", "Ви разумемо?", "Ви разумеју?"], correct: 0, explanation: "Для местоимения «Ви» окончанием служит «-те». Разумети ➔ разумете. Ви разумете?" },
            { text: "Как сказать «Они работают» (работать = радити, группа -И)?", sub: "3-е лицо множественного числа.", options: ["радију", "раде", "радимо"], correct: 1, explanation: "Для глаголов группы «-и» форма «Они» оканчивается на «-е» ➔ раде." }
        ];

        let currentQuestion = 0; let score = 0; let timerInterval; let secondsElapsed = 0; let userAnswers = [];

        function startQuiz() {
            document.getElementById('start-screen').classList.add('hidden');
            document.getElementById('question-screen').classList.remove('hidden');
            currentQuestion = 0; score = 0; secondsElapsed = 0; userAnswers = [];
            document.getElementById('progress-bar').style.width = '0%';
            clearInterval(timerInterval);
            timerInterval = setInterval(() => {
                secondsElapsed++;
                const mins = String(Math.floor(secondsElapsed / 60)).padStart(2, '0');
                const secs = String(secondsElapsed % 60).padStart(2, '0');
                document.getElementById('timer').innerText = `${mins}:${secs}`;
            }, 1000);
            showQuestion();
        }

        function showQuestion() {
            document.getElementById('explanation-box').classList.add('hidden');
            const q = questions[currentQuestion];
            document.getElementById('question-counter').innerText = `Вопрос ${currentQuestion + 1} из ${questions.length}`;
            document.getElementById('progress-bar').style.width = `${(currentQuestion / questions.length) * 100}%`;
            document.getElementById('question-text').innerText = q.text;
            document.getElementById('question-sub').innerText = q.sub;

            const container = document.getElementById('options-container');
            container.innerHTML = '';
            q.options.forEach((opt, idx) => {
                const btn = document.createElement('button');
                btn.className = "option-btn w-full text-left p-4 bg-slate-800/60 border border-slate-700 rounded-xl text-lg font-bold";
                btn.innerText = opt;
                btn.onclick = () => selectOption(idx, btn);
                container.appendChild(btn);
            });
        }

        function selectOption(idx, btn) {
            const q = questions[currentQuestion];
            const buttons = document.getElementById('options-container').querySelectorAll('button');
            buttons.forEach(b => b.disabled = true);

            const isCorrect = (idx === q.correct);
            userAnswers.push({ questionIndex: currentQuestion, selectedOption: idx, isCorrect: isCorrect });

            if (isCorrect) { btn.classList.add('correct'); score++; } 
            else { btn.classList.add('wrong'); buttons[q.correct].classList.add('correct'); }

            document.getElementById('explanation-text').innerText = q.explanation;
            document.getElementById('explanation-box').classList.remove('hidden');
        }

        function nextQuestion() {
            currentQuestion++;
            if (currentQuestion < questions.length) showQuestion();
            else finishQuiz();
        }

        function finishQuiz() {
            clearInterval(timerInterval);
            document.getElementById('question-screen').classList.add('hidden');
            document.getElementById('result-screen').classList.remove('hidden');
            document.getElementById('progress-bar').style.width = '100%';

            const pct = Math.round((score / questions.length) * 100);
            document.getElementById('result-percent').innerText = `${pct}%`;
            document.getElementById('result-points').innerText = `${score} / ${questions.length} баллов`;
            document.getElementById('result-ring').style.strokeDashoffset = 502 - (502 * pct) / 100;

            const mins = String(Math.floor(secondsElapsed / 60)).padStart(2, '0');
            const secs = String(secondsElapsed % 60).padStart(2, '0');
            document.getElementById('result-time').innerText = `${mins}:${secs}`;

            let title = "", desc = "", rank = "";
            if (pct === 100) { title = "Царь Спряжений! 👑"; desc = "Ты безошибочно спрягаешь любые сербские глаголы. Невероятный результат!"; rank = "Профи"; triggerConfetti(); }
            else if (pct >= 80) { title = "Замечательно! 🚀"; desc = "Очень уверенное владение временем Презент. Отличный результат."; rank = "Знаток"; triggerConfetti(); }
            else if (pct >= 50) { title = "Хорошая попытка! 👍"; desc = "Основы понятны, но тебе нужно еще раз заглянуть в симулятор спряжения."; rank = "Ученик"; }
            else { title = "Стоит повторить 📚"; desc = "Обрати внимание на личные окончания (-м, -ш, -мо, -те, -ју/-е/-у)."; rank = "Новичок"; }

            document.getElementById('result-title').innerText = title;
            document.getElementById('result-desc').innerText = desc;
            document.getElementById('result-rank').innerText = rank;
        }

        function triggerConfetti() {
            confetti({ particleCount: 100, spread: 70, origin: { y: 0.6 } });
        }

        let isReviewOpen = false;
        function toggleReview() {
            const box = document.getElementById('review-box');
            isReviewOpen = !isReviewOpen;
            if (isReviewOpen) {
                box.classList.remove('hidden');
                document.getElementById('review-btn').innerText = "Скрыть";
                const container = document.getElementById('review-items');
                container.innerHTML = '';
                userAnswers.forEach(ans => {
                    const q = questions[ans.questionIndex];
                    const item = document.createElement('div');
                    item.className = `p-4 rounded-xl border ${ans.isCorrect ? 'border-emerald-500/20 bg-emerald-500/5' : 'border-red-500/20 bg-red-500/5'}`;
                    item.innerHTML = `
                        <div class="flex items-center gap-2 mb-1"><span class="text-lg">${ans.isCorrect ? '✅' : '❌'}</span><h4 class="font-bold text-white text-base">${q.text}</h4></div>
                        <p class="text-xs text-slate-400 mb-2">Выбор: <strong class="${ans.isCorrect?'text-emerald-400':'text-red-400'}">${q.options[ans.selectedOption]}</strong></p>
                        <p class="text-xs text-slate-300 bg-slate-900/40 p-2.5 rounded border border-slate-700/50">${q.explanation}</p>
                    `;
                    container.appendChild(item);
                });
            } else {
                box.classList.add('hidden');
                document.getElementById('review-btn').innerText = "Ошибки";
            }
        }

        function restartQuiz() {
            document.getElementById('result-screen').classList.add('hidden');
            document.getElementById('review-box').classList.add('hidden');
            document.getElementById('review-btn').innerText = "Ошибки";
            isReviewOpen = false;
            startQuiz();
        }
    </script>
</body>
</html>
